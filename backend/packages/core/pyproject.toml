[project]
name = "csv-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "bcrypt",
  "itsdangerous",
  "csv-ai",
  "csv-contracts",
  "csv-db",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
include = ["core*"]
