[project]
name = "csv-ai"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "anthropic>=0.52",
  "openai>=1.50",
  "markitdown>=0.1",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
include = ["ai*"]
