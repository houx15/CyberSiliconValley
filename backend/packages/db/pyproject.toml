[project]
name = "csv-db"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "sqlalchemy",
  "psycopg[binary]",
  "alembic",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
include = ["db*"]
